<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Venezuela - Portal de Emergencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f8; color: #333; padding-top: 60px; }
        
        .navbar { 
            position: fixed; top: 0; width: 100%; height: 60px; background-color: #d9534f; 
            color: white; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-auth { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }

        .tabs-container { 
            display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 5px; 
            background: white; padding: 8px; border-bottom: 1px solid #dcdcdc; 
            position: sticky; top: 60px; z-index: 999;
        }
        .tab-btn { flex: 1; min-width: 90px; padding: 10px 5px; font-size: 11px; font-weight: 700; border: none; background: #f8f8f8; border-radius: 6px; cursor: pointer; color: #666; white-space: nowrap; }
        .tab-btn.active { background: #d9534f; color: white; }
        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; }

        .form-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid #dcdcdc; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        input:focus, textarea:focus { border-color: #d9534f; outline: none; }
        .btn-publish { width: 100%; background: #d9534f; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .feed-card { background: white; border: 1px solid #dcdcdc; border-radius: 12px; padding: 16px; margin-bottom: 15px; }
        .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feed-avatar { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: #eee; }
        .feed-username { font-weight: 700; font-size: 14px; }
        .feed-body { font-size: 14px; color: #444; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-weight: bold;">🚨 SOS VENEZUELA</div>
        <button class="btn-auth" onclick="alert('Acceso para personal autorizado')">👤 Autorizado</button>
    </div>

    <div class="tabs-container">
        <button id="tab-encontrados-btn" class="tab-btn active" onclick="cambiarPestana('encontrados')">✅ A SALVO</button>
        <button id="tab-atrapados-btn" class="tab-btn" onclick="cambiarPestana('atrapados')">⚠️ ATRAPADOS</button>
        <button id="tab-desaparecidos-btn" class="tab-btn" onclick="cambiarPestana('desaparecidos')">🔍 BUSCADO</button>
        <button id="tab-acopio-btn" class="tab-btn" onclick="cambiarPestana('acopio')">📦 ACOPIOS</button>
        <button id="tab-noticias-btn" class="tab-btn" onclick="cambiarPestana('noticias')">📢 NOTICIAS</button>
    </div>

    <div class="container">
        <div id="formulario-ciudadano" class="form-box" style="display:none;">
            <h3 style="margin-bottom: 15px; font-size: 16px;">Crear nuevo reporte</h3>
            <input type="hidden" id="form-categoria">
            <div class="input-group"><input type="text" id="form-nombre" placeholder="Nombre completo"></div>
            <div class="input-group"><textarea id="form-detalles" placeholder="Detalles..." rows="3"></textarea></div>
            <div class="input-group"><input type="text" id="form-contacto" placeholder="Teléfono / Ubicación"></div>
            <div class="input-group"><input type="file" id="form-foto" accept="image/*"></div>
            <button class="btn-publish" onclick="enviarReportePublico()">Publicar reporte</button>
        </div>

        <div id="contenido-encontrados" class="tab-content active"><div id="lista-encontrados"></div></div>
        <div id="contenido-atrapados" class="tab-content"><div id="lista-atrapados"></div></div>
        <div id="contenido-desaparecidos" class="tab-content"><div id="lista-desaparecidos"></div></div>
        <div id="contenido-acopio" class="tab-content"><div id="lista-acopio"></div></div>
        <div id="contenido-noticias" class="tab-content"><div id="lista-noticias"></div></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://eiespojygliahqtjkkyd.supabase.co", "sb_publishable_TlydS60DSu5pDs6i9LwIPQ_zl00u_mR");
        const ICONO_SIN_FOTO = "https://ui-avatars.com/api/?name=SOS&background=e2e8f0&color=64748b&size=128";

        function cambiarPestana(cat) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('contenido-' + cat).classList.add('active');
            document.getElementById('tab-' + cat + '-btn').classList.add('active');
            document.getElementById('form-categoria').value = cat;
            document.getElementById('formulario-ciudadano').style.display = 'block';
        }

        async function cargarContenido() {
            const { data: reportes } = await _supabase.from('reportes').select('*').order('created_at', { ascending: false });
            ['encontrados', 'atrapados', 'desaparecidos', 'acopio', 'noticias'].forEach(cat => {
                const contenedor = document.getElementById('lista-' + cat);
                contenedor.innerHTML = "";
                const filtrados = reportes ? reportes.filter(r => r.categoria === cat) : [];
                filtrados.forEach(item => {
                    contenedor.innerHTML += `
                        <div class="feed-card">
                            <div class="feed-header">
                                <img src="${item.foto || ICONO_SIN_FOTO}" class="feed-avatar">
                                <span class="feed-username">${item.nombre}</span>
                            </div>
                            <div class="feed-body">${item.detalles}<br><br><b>Contacto:</b> ${item.contacto}</div>
                        </div>`;
                });
            });
        }

        async function enviarReportePublico() {
            const nombre = document.getElementById('form-nombre').value;
            const cat = document.getElementById('form-categoria').value || 'encontrados';
            const detalles = document.getElementById('form-detalles').value;
            const contacto = document.getElementById('form-contacto').value;
            const fotoFile = document.getElementById('form-foto').files[0];
            
            let urlFoto = null;
            if (fotoFile) {
                const path = `${Date.now()}_${fotoFile.name}`;
                const { data } = await _supabase.storage.from('fotos-reportes').upload(path, fotoFile);
                if (data) urlFoto = _supabase.storage.from('fotos-reportes').getPublicUrl(path).data.publicUrl;
            }

            await _supabase.from('reportes').insert([{ nombre, categoria: cat, detalles, contacto, foto: urlFoto }]);
            location.reload();
        }

        window.onload = cargarContenido;
    </script>
</body>
</html>
