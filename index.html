<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Venezuela - Portal de Emergencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #d9534f; --gray: #f4f6f8; --border: #e3e4e6; --text: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--gray); color: var(--text); padding-bottom: 40px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* Tabs */
        .tabs-container { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; background: white; padding: 10px; border-radius: 12px; }
        .tab-btn { flex: 1; padding: 10px; font-size: 11px; font-weight: 700; border: none; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: 0.3s; color: #666; }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Botones de acción */
        .action-area { text-align: center; margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Formulario Estético */
        .form-box { background: white; padding: 25px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); display: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        .btn-publish { width: 100%; background: #222; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* Feed */
        .feed-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
        .feed-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .feed-avatar { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; background: #f0f0f0; }
        .feed-username { font-weight: 800; font-size: 16px; }
        .feed-body { font-size: 14px; line-height: 1.5; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs-container">
            <button id="tab-encontrados-btn" class="tab-btn active" onclick="cambiarPestana('encontrados')">A SALVO</button>
            <button id="tab-atrapados-btn" class="tab-btn" onclick="cambiarPestana('atrapados')">ATRAPADOS</button>
            <button id="tab-desaparecidos-btn" class="tab-btn" onclick="cambiarPestana('desaparecidos')">DESAPARECIDOS</button>
        </div>

        <div id="formulario-ciudadano" class="form-box">
            <h3 style="margin-bottom: 15px;">Nuevo reporte</h3>
            <input type="hidden" id="form-categoria">
            <input type="text" id="form-nombre" placeholder="Nombre completo">
            <textarea id="form-detalles" placeholder="¿Qué sucede o dónde está?" rows="3"></textarea>
            <input type="text" id="form-contacto" placeholder="Teléfono de contacto">
            <input type="file" id="form-foto" accept="image/*">
            <button class="btn-publish" onclick="enviarReportePublico()">Publicar Información</button>
        </div>

        <div id="area-botones" class="action-area">
            <button id="btn-reportar-dinamico" class="btn-main" onclick="mostrarFormulario()">+ Crear nuevo reporte</button>
        </div>

        <div id="contenido-encontrados" class="tab-content active"><div id="lista-encontrados"></div></div>
        <div id="contenido-atrapados" class="tab-content"><div id="lista-atrapados"></div></div>
        <div id="contenido-desaparecidos" class="tab-content"><div id="lista-desaparecidos"></div></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://eiespojygliahqtjkkyd.supabase.co", "sb_publishable_TlydS60DSu5pDs6i9LwIPQ_zl00u_mR");
        const ICONO_SIN_FOTO = "https://ui-avatars.com/api/?name=SOS&background=e2e8f0&color=64748b&size=128";

        function cambiarPestana(cat) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('contenido-' + cat).classList.add('active');
            document.getElementById('tab-' + cat + '-btn').classList.add('active');
            document.getElementById('form-categoria').value = cat;
            document.getElementById('formulario-ciudadano').style.display = 'none';
        }

        function mostrarFormulario() { document.getElementById('formulario-ciudadano').style.display = 'block'; }

        async function cargarContenido() {
            const { data: reportes } = await _supabase.from('reportes').select('*').order('created_at', { ascending: false });
            const categorias = ['encontrados', 'atrapados', 'desaparecidos'];
            categorias.forEach(cat => {
                const contenedor = document.getElementById('lista-' + cat);
                contenedor.innerHTML = "";
                const filtrados = reportes ? reportes.filter(r => r.categoria === cat) : [];
                filtrados.forEach(item => {
                    contenedor.innerHTML += `
                        <div class="feed-card">
                            <div class="feed-header">
                                <img src="${item.foto || ICONO_SIN_FOTO}" class="feed-avatar">
                                <span class="feed-username">${item.nombre}</span>
                            </div>
                            <div class="feed-body">${item.detalles}<br><br><b>Contacto:</b> ${item.contacto}</div>
                        </div>`;
                });
            });
        }

        async function enviarReportePublico() {
            const nombre = document.getElementById('form-nombre').value;
            const cat = document.getElementById('form-categoria').value || 'encontrados';
            const detalles = document.getElementById('form-detalles').value;
            const contacto = document.getElementById('form-contacto').value;
            const fotoFile = document.getElementById('form-foto').files[0];
            
            let urlFoto = null;
            if (fotoFile) {
                const path = `${Date.now()}_${fotoFile.name}`;
                const { data } = await _supabase.storage.from('fotos-reportes').upload(path, fotoFile);
                if (data) urlFoto = _supabase.storage.from('fotos-reportes').getPublicUrl(path).data.publicUrl;
            }

            await _supabase.from('reportes').insert([{ nombre, categoria: cat, detalles, contacto, foto: urlFoto }]);
            location.reload();
        }

        window.onload = cargarContenido;
    </script>
</body>
</html>
