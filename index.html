<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Venezuela - Portal de Emergencia</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f8; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }

        /* Tabs */
        .tabs-container { display: flex; gap: 5px; margin-bottom: 20px; background: white; padding: 8px; border-radius: 10px; border: 1px solid #dcdcdc; }
        .tab-btn { flex: 1; padding: 12px; font-size: 12px; font-weight: 700; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: #666; }
        .tab-btn.active { background: #d9534f; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Formulario Estético pero Simple */
        .form-box { background: white; padding: 20px; border-radius: 12px; border: 1px solid #dcdcdc; margin-bottom: 20px; display: none; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: #555; }
        input[type="text"], textarea { 
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; 
            font-size: 14px; transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus { border-color: #d9534f; outline: none; box-shadow: 0 0 0 3px rgba(217,83,79,0.1); }
        .btn-publish { width: 100%; background: #d9534f; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* Feed */
        .feed-card { background: white; border: 1px solid #dcdcdc; border-radius: 12px; padding: 16px; margin-bottom: 15px; }
        .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feed-avatar { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; background: #eee; }
        .feed-username { font-weight: 700; font-size: 14px; }
        .feed-body { font-size: 14px; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs-container">
            <button id="tab-encontrados-btn" class="tab-btn active" onclick="cambiarPestana('encontrados')">A SALVO</button>
            <button id="tab-atrapados-btn" class="tab-btn" onclick="cambiarPestana('atrapados')">ATRAPADOS</button>
            <button id="tab-desaparecidos-btn" class="tab-btn" onclick="cambiarPestana('desaparecidos')">DESAPARECIDOS</button>
        </div>

        <div id="formulario-ciudadano" class="form-box">
            <h3 style="margin-bottom: 15px; font-size: 16px;">Nuevo reporte</h3>
            <input type="hidden" id="form-categoria">
            <div class="input-group"><input type="text" id="form-nombre" placeholder="Nombre completo"></div>
            <div class="input-group"><textarea id="form-detalles" placeholder="Detalles de la situación" rows="3"></textarea></div>
            <div class="input-group"><input type="text" id="form-contacto" placeholder="Teléfono o ubicación"></div>
            <div class="input-group"><input type="file" id="form-foto" accept="image/*"></div>
            <button class="btn-publish" onclick="enviarReportePublico()">Publicar</button>
        </div>

        <div id="contenido-encontrados" class="tab-content active"><div id="lista-encontrados"></div></div>
        <div id="contenido-atrapados" class="tab-content"><div id="lista-atrapados"></div></div>
        <div id="contenido-desaparecidos" class="tab-content"><div id="lista-desaparecidos"></div></div>
    </div>

    <script>
        const _supabase = supabase.createClient("https://eiespojygliahqtjkkyd.supabase.co", "sb_publishable_TlydS60DSu5pDs6i9LwIPQ_zl00u_mR");
        const ICONO_SIN_FOTO = "https://ui-avatars.com/api/?name=SOS&background=e2e8f0&color=64748b&size=128";

        function cambiarPestana(cat) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('contenido-' + cat).classList.add('active');
            document.getElementById('tab-' + cat + '-btn').classList.add('active');
            document.getElementById('form-categoria').value = cat;
            document.getElementById('formulario-ciudadano').style.display = 'block';
        }

        async function cargarContenido() {
            const { data: reportes } = await _supabase.from('reportes').select('*').order('created_at', { ascending: false });
            ['encontrados', 'atrapados', 'desaparecidos'].forEach(cat => {
                const contenedor = document.getElementById('lista-' + cat);
                contenedor.innerHTML = "";
                const filtrados = reportes ? reportes.filter(r => r.categoria === cat) : [];
                filtrados.forEach(item => {
                    contenedor.innerHTML += `
                        <div class="feed-card">
                            <div class="feed-header">
                                <img src="${item.foto || ICONO_SIN_FOTO}" class="feed-avatar">
                                <span class="feed-username">${item.nombre}</span>
                            </div>
                            <div class="feed-body">${item.detalles}<br><br><b>Contacto:</b> ${item.contacto}</div>
                        </div>`;
                });
            });
        }

        async function enviarReportePublico() {
            const nombre = document.getElementById('form-nombre').value;
            const cat = document.getElementById('form-categoria').value || 'encontrados';
            const detalles = document.getElementById('form-detalles').value;
            const contacto = document.getElementById('form-contacto').value;
            const fotoFile = document.getElementById('form-foto').files[0];
            
            let urlFoto = null;
            if (fotoFile) {
                const path = `${Date.now()}_${fotoFile.name}`;
                const { data } = await _supabase.storage.from('fotos-reportes').upload(path, fotoFile);
                if (data) urlFoto = _supabase.storage.from('fotos-reportes').getPublicUrl(path).data.publicUrl;
            }

            await _supabase.from('reportes').insert([{ nombre, categoria: cat, detalles, contacto, foto: urlFoto }]);
            location.reload();
        }

        window.onload = cargarContenido;
    </script>
</body>
</html>
